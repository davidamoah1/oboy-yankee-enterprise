name: Keep Neon Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/health" || true)
          echo "Health check response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "Success - Neon database is awake"
          else
            echo "Warning - Health check returned $RESPONSE"
          fi
